<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Agente de Consulta</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <span class="header-icon">⚡</span>
        <h1 class="login-title">Agente de Consulta</h1>
        <p class="login-sub">PostgreSQL · Google Sheets</p>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label class="login-label" for="username">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            class="login-input"
            placeholder="tu_usuario"
            autocomplete="username"
            required
          />
        </div>

        <div class="login-field">
          <label class="login-label" for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            class="login-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <p id="login-error" class="login-error"></p>

        <button type="submit" id="login-btn" class="login-btn">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    // Si ya hay un token válido, redirigir al chat
    if (localStorage.getItem("auth_token")) {
      window.location.replace("/");
    }

    const form    = document.getElementById("login-form");
    const errorEl = document.getElementById("login-error");
    const btn     = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Verificando…";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem("auth_token",    data.access_token);
          localStorage.setItem("auth_username", username);
          window.location.replace("/");
        } else {
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.detail || "Credenciales incorrectas.";
          errorEl.style.display = "block";
        }
      } catch {
        errorEl.textContent = "Error de conexión. Verificá que el servidor esté corriendo.";
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Ingresar";
      }
    });
  </script>
</body>
</html>
